<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Impian Menjadi Dokter Gigi</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      background: linear-gradient(to bottom right, #fff0f5, #ffffff);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:90%;
      max-width:600px;
      background:white;
      border-radius:25px;
      padding:40px;
      text-align:center;
      box-shadow:0 10px 30px rgba(255,105,180,0.2);
      position:relative;
    }

    h1{
      color:#ff4fa3;
      margin-bottom:15px;
      font-size:35px;
    }

    p{
      color:#555;
      font-size:18px;
      margin-bottom:25px;
    }

    .stickers{
      font-size:55px;
      margin-bottom:20px;
      animation: float 2s infinite ease-in-out;
    }

    @keyframes float{
      0%{transform:translateY(0px);}
      50%{transform:translateY(-10px);}
      100%{transform:translateY(0px);}
    }

    .buttons{
      position:relative;
      height:150px;
    }

    button{
      padding:15px 30px;
      border:none;
      border-radius:15px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    #yesBtn{
      background:#ff69b4;
      color:white;
      margin-right:10px;
    }

    #yesBtn:hover{
      background:#ff1493;
      transform:scale(1.05);
    }

    #noBtn{
      background:white;
      color:#ff1493;
      border:2px solid #ff69b4;
      position:absolute;
    }

    .message{
      margin-top:25px;
      font-size:22px;
      color:#ff1493;
      font-weight:bold;
      min-height:50px;
    }

    .heart{
      position:absolute;
      color:pink;
      font-size:20px;
      animation:fall linear infinite;
      top:-50px;
    }

    @keyframes fall{
      to{
        transform:translateY(110vh);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="stickers">🦷💖🩺✨</div>

    <h1>Aku Ingin Menjadi Dokter Gigi!</h1>

    <p>
      Apakah kamu yakin bisa meraih cita-cita menjadi dokter gigi hebat? 💕
    </p>

    <div class="buttons">
      <button id="yesBtn">Iya 💗</button>
      <button id="noBtn">Tidak 😅</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");

    // Posisi awal tombol tidak
    noBtn.style.left = "320px";
    noBtn.style.top = "0px";

    // Saat klik iya
    yesBtn.addEventListener("click", () => {
      message.innerHTML =
        "Hebat! 🌟 Kamu pasti bisa menjadi dokter gigi yang pintar, baik, dan sukses! 🦷💖";
    });

    // Tombol tidak kabur
    noBtn.addEventListener("mouseover", () => {
      moveButton();
    });

    noBtn.addEventListener("click", () => {
      moveButton();
    });

    function moveButton(){
      const container = document.querySelector(".buttons");

      const maxX = container.clientWidth - noBtn.offsetWidth;
      const maxY = container.clientHeight - noBtn.offsetHeight;

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    // Efek hati jatuh
    function createHeart(){
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💖";

      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
